<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORD OF GOD ENTERPRISES</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:0;
}

.container{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    display:block;
    margin:auto;
    object-fit:cover;
}

h1{
    text-align:center;
    margin-top:15px;
    margin-bottom:5px;
}

.city{
    text-align:center;
    color:gray;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:black;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#333;
}

.result{
    display:none;
    margin-top:25px;
    background:#fafafa;
    padding:20px;
    border-radius:10px;
}

.result p{
    margin-bottom:15px;
    line-height:1.5;
}

.status{
    color:green;
    font-weight:bold;
}

.error{
    color:red;
    text-align:center;
    margin-top:15px;
}

.progress-container{
    margin-top:35px;
}

.progress-bar{
    display:flex;
    justify-content:space-between;
    position:relative;
}

.progress-bar::before{
    content:'';
    position:absolute;
    top:17px;
    left:0;
    width:100%;
    height:4px;
    background:#ddd;
    z-index:1;
}

.progress-fill{
    position:absolute;
    top:17px;
    left:0;
    height:4px;
    background:green;
    z-index:2;
    transition:1s;
}

.step{
    position:relative;
    z-index:3;
    width:20%;
    text-align:center;
    font-size:11px;
}

.circle{
    width:35px;
    height:35px;
    border-radius:50%;
    background:#ddd;
    color:white;
    margin:auto;
    line-height:35px;
    font-weight:bold;
}

.active .circle{
    background:green;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.1);
    }

    100%{
        transform:scale(1);
    }
}

</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>WORD OF GOD ENTERPRISES</h1>

<p class="city">Hyderabad</p>

<input type="text" id="trackingInput" placeholder="Enter Tracking ID">

<button onclick="trackOrder()">Track Order</button>

<div id="error" class="error"></div>

<div id="result" class="result"></div>

</div>

<script>

const orders = {

"WOG2026": {

order: "Premium Lighting Podium - QTY 2",

customer: "Aimol Khullen Baptist Church SBA",

phone: "+91 98632 30685",

address: "P O Pallel, Pallel Bazaar, Kakching, Manipur 795103. C/o Ch Sote Aimol Pastor",

courier: "India Post EMS",

tracking: "WOG2026",

status: "Shipped 05/05/2026",

progress: 50,

steps: 3

},

"WOG20261": {

order: "Lighting Podium Medium",

customer: "Apostolic Christian Assembly",

phone: "8618220437",

address: "Attibelle, Bangalore, Karnataka",

courier: "TVK TRAVELS - AR01W3336 | Bus Driver Contact : 6379413336",

tracking: "WOG20261",

status: "Out For Delivery",

progress: 75,

steps: 4

},

    ,

"WOG20262": {

order: "Spares / Parts of the Premium Lighting Podium",

customer: "Dr. Mung Guite",

phone: "9859307777",

address: "Zotang counter, near Hotel Bawngkawn, Lunglei Road, Mizoram 796014",

courier: "India Post EMS",

tracking: "WOG20262",

status: "Shipped",

progress: 50,

steps: 3

}

};

function trackOrder(){

const tracking =
document.getElementById("trackingInput")
.value
.trim()
.toUpperCase();

const order = orders[tracking];

if(order){

document.getElementById("error").innerHTML = "";

document.getElementById("result").style.display = "block";

document.getElementById("result").innerHTML = `

<p>
<strong>Order:</strong><br>
${order.order}
</p>

<p>
<strong>Customer Name:</strong><br>
${order.customer}
</p>

<p>
<strong>Phone:</strong><br>
${order.phone}
</p>

<p>
<strong>Address:</strong><br>
${order.address}
</p>

<p>
<strong>Courier:</strong><br>
${order.courier}
</p>

<p>
<strong>Tracking ID:</strong><br>
${order.tracking}
</p>

<p>
<strong>Status:</strong><br>
<span class="status">${order.status}</span>
</p>

<div class="progress-container">

<div class="progress-bar">

<div class="progress-fill"
style="width:${order.progress}%;">
</div>

<div class="step ${order.steps >= 1 ? 'active' : ''}">
<div class="circle">1</div>
<p>Order Created</p>
</div>

<div class="step ${order.steps >= 2 ? 'active' : ''}">
<div class="circle">2</div>
<p>Shipped</p>
</div>

<div class="step ${order.steps >= 3 ? 'active' : ''}">
<div class="circle">3</div>
<p>Assigned Courier</p>
</div>

<div class="step ${order.steps >= 4 ? 'active' : ''}">
<div class="circle">4</div>
<p>Out for Delivery</p>
</div>

<div class="step ${order.steps >= 5 ? 'active' : ''}">
<div class="circle">5</div>
<p>Delivered</p>
</div>

</div>

</div>

`;

}

else{

document.getElementById("result").style.display = "none";

document.getElementById("error").innerHTML =
"Tracking ID not found";

}

}

</script>

</body>
</html>
